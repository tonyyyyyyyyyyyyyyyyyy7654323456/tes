kind = "web"
previewPath = "/tesla-invest/"
title = "Tesla Stock Investment"
version = "1.0.0"
id = "artifacts/tesla-invest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/tesla-invest/" ]
localPort = 25735

[services.development]
run = "pnpm --filter @workspace/tesla-invest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tesla-invest", "run", "build" ]
publicDir = "artifacts/tesla-invest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25735"
BASE_PATH = "/tesla-invest/"
